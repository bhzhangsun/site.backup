name: Build & Deploy me.noir

# 触发：push 到 main 且只关心站点文件 / workflow / 部署清单 / submodule 引用
on:
  push:
    branches: [main]
    paths:
      - 'hugo.toml'
      - 'example.hugo.toml'
      - 'content/**'
      - 'themes/**'
      - 'layouts/**'
      - 'static/**'
      - 'data/**'
      - 'archetypes/**'
      - 'i18n/**'
      - 'assets/**'
      - '.gitignore'
      - '.gitmodules'
      - 'deploy/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      hugo_version:
        description: 'Hugo 版本覆盖（留空走默认）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  # 默认版本号，作为 inputs.hugo_version 为空时的回退
  HUGO_VERSION_DEFAULT: '0.147.0'

jobs:
  build:
    name: Build (Hugo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        env:
          # 在 step 级 env 里引用工作流级 env.HUGO_VERSION_DEFAULT 是允许的
          HUGO_VERSION: ${{ github.event.inputs.hugo_version || env.HUGO_VERSION_DEFAULT }}
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Hugo version
        run: hugo version

      - name: Build (gc + minify)
        run: hugo --gc --minify --logLevel info

      - name: Show build output
        run: |
          echo "files: $(find public -type f | wc -l)"
          echo "size : $(du -sh public | cut -f1)"
          echo "head :"
          find public -maxdepth 2 -type d | sort | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: me-noir-public
          path: public
          retention-days: 30
          if-no-files-found: error

  set-matrix:
    name: Read host list
    needs: build
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.read.outputs.hosts }}
    steps:
      - uses: actions/checkout@v4
      - name: Load deploy/hosts.json
        id: read
        run: |
          set -euo pipefail
          jq -e 'type == "array" and length > 0' deploy/hosts.json
          # GITHUB_OUTPUT 要求 key=value 或 key<<EOF\nvalue\nEOF 格式
          {
            echo "hosts<<EOF"
            jq -c '{hosts: .}' deploy/hosts.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ${{ matrix.host.name }}
    needs: set-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    # 按机器拆并发组：同机器多次 push 串行；不同机器互不阻塞
    concurrency:
      group: deploy-me.noir-${{ matrix.host.name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.set-matrix.outputs.hosts).hosts }}
    steps:
      # sparse-checkout deploy/ 拿 known_hosts；同时 download artifact。
      # 注意：必须在 download artifact 之前完成 checkout，
      # 否则会被 artifact 覆盖导致 deploy/known_hosts 丢失。
      - name: Checkout (sparse, for deploy/known_hosts)
        uses: actions/checkout@v4
        with:
          sparse-checkout: deploy
          fetch-depth: 1

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: me-noir-public
          path: public

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Ensure IPv6 default route (IPv6 targets only)
        if: contains(matrix.host.host, ':')
        run: |
          set -euo pipefail
          if ip -6 route show default | grep -q .; then
            echo "IPv6 default route already exists:"
            ip -6 route show default
          else
            IFACE=$(ip -6 addr show scope global -temporary \
                    | awk '/inet6/ {print $NF; exit}')
            if [[ -z "$IFACE" ]]; then
              echo "::error::No interface with global IPv6 address on runner"
              ip -6 addr show
              exit 1
            fi
            echo "Adding IPv6 default route via fe80::1 on $IFACE"
            sudo ip -6 route add default via fe80::1 dev "$IFACE"
            ip -6 route show default
          fi

      - name: Add known hosts
        env:
          # Secret 留作回退（可后续在 Settings → Secrets 删除）
          KNOWN_HOSTS_SECRET: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # 优先用仓库内 deploy/known_hosts（跟代码一起走，无 Secret 缓存问题）
          if [[ -s deploy/known_hosts ]]; then
            echo "--- source: deploy/known_hosts (repo) ---"
            cp deploy/known_hosts ~/.ssh/known_hosts
          elif [[ -n "${KNOWN_HOSTS_SECRET:-}" ]]; then
            echo "--- source: DEPLOY_KNOWN_HOSTS secret (fallback) ---"
            printf '%s\n' "$KNOWN_HOSTS_SECRET" > ~/.ssh/known_hosts
          else
            echo "::error::No known_hosts source. Commit deploy/known_hosts or set DEPLOY_KNOWN_HOSTS secret."
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts
          echo "--- hosts in known_hosts (first column) ---"
          awk 'NF && $1 !~ /^#/{print "  →", $1}' ~/.ssh/known_hosts
          echo "--- known_hosts fingerprints ---"
          ssh-keygen -lf ~/.ssh/known_hosts || true

      - name: Verify live host key vs known_hosts
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
        run: |
          set -euo pipefail
          echo "=== live ssh-keyscan (ed25519 only) ==="
          LIVE=$(ssh-keyscan -p "$PORT" -T 8 "$HOST" 2>/dev/null \
                 | awk '$2 == "ssh-ed25519"' || true)
          if [[ -z "$LIVE" ]]; then
            echo "::error::ssh-keyscan did not return an ed25519 key for $HOST:$PORT"
            ssh-keyscan -p "$PORT" -T 8 "$HOST" 2>&1 || true
            exit 1
          fi
          echo "$LIVE"

          echo "=== file ed25519 entries (any host pattern) ==="
          FILE=$(awk 'NF && $1 !~ /^#/' ~/.ssh/known_hosts | awk '$2 == "ssh-ed25519"' || true)
          echo "$FILE"

          echo "=== key-by-key comparison ==="
          LIVE_KEY=$(echo "$LIVE" | awk '{print $NF}')
          if echo "$FILE" | grep -qF "$LIVE_KEY"; then
            echo "OK: server's ed25519 key is present in known_hosts"
          else
            echo "::error::server's ed25519 key is NOT in known_hosts"
            echo "  server : $LIVE"
            echo "  file   : $FILE"
            echo ""
            echo "VPS host key has rotated. Fix: ssh-keyscan -p $PORT -T 8 $HOST | grep ' ssh-ed25519 ' >> deploy/known_hosts"
            exit 1
          fi

      - name: Self-test SSH connection
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
          USER: ${{ matrix.host.user }}
        run: |
          set -euo pipefail
          # 关键：加 -o HashKnownHosts=no
          # GitHub Actions ubuntu runner 的 /etc/ssh/ssh_config 默认
          # HashKnownHosts=yes，会让 ssh 客户端忽略明文条目（但 ssh-keygen /
          # ssh-keyscan 不受影响，这就是为什么 "Verify" 看到 OK 而 ssh 报
          # "No ED25519 host key is known"）。我们的 deploy/known_hosts 是
          # 明文（方便 git diff / PR review），所以客户端必须显式关掉哈希。
          set +e
          OUT=$(ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
            -o HashKnownHosts=no \
            -o BatchMode=yes \
            -o ConnectTimeout=8 \
            -o LogLevel=ERROR \
            "$USER@$HOST" "echo SSH_OK" 2>&1)
          RC=$?
          set -e
          if [[ $RC -eq 0 ]]; then
            echo "OK: ssh self-test connected and authenticated"
            exit 0
          fi
          echo "::error::ssh self-test failed (rc=$RC), output:"
          echo "$OUT"
          echo "---- re-running with -vvv for diagnosis ----"
          ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
            -o HashKnownHosts=no \
            -o BatchMode=yes \
            -o ConnectTimeout=8 \
            -vvv \
            "$USER@$HOST" "echo SSH_OK" 2>&1 \
            | grep -E 'debug1: (Server host key|HostKey|known_hosts|Matching|No matching|Connecting|Authentications|Remote protocol version|kex_exchange_identification|Reading|HashKnownHosts)' \
            | head -60 || true
          exit 1

      - name: rsync -> ${{ matrix.host.name }}
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
          USER: ${{ matrix.host.user }}
          PATH_: ${{ matrix.host.path }}
        run: |
          set -euo pipefail
          # IPv6 字面量需方括号包裹；IPv4 / 域名保持原样
          if [[ "$HOST" == *":"* ]]; then
            TARGET="${USER}@[${HOST}]:${PATH_}/"
          else
            TARGET="${USER}@${HOST}:${PATH_}/"
          fi
          rsync -avz --delete \
            --no-perms --no-owner --no-group \
            -e "ssh -p ${PORT} \
                    -o StrictHostKeyChecking=yes \
                    -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
                    -o HashKnownHosts=no \
                    -o LogLevel=ERROR" \
            public/ \
            "${TARGET}"
          echo "OK: ${{ matrix.host.name }} deployed to ${TARGET}"
