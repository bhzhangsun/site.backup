name: Build & Deploy me.noir

# 触发：push 到 main，只关心站点文件 / workflow / 部署脚本（不含部署配置，配置走 GitHub Variables/Secrets）
on:
  push:
    branches: [main]
    paths:
      - 'hugo.toml'
      - 'example.hugo.toml'
      - 'content/**'
      - 'themes/**'
      - 'layouts/**'
      - 'static/**'
      - 'data/**'
      - 'archetypes/**'
      - 'i18n/**'
      - 'assets/**'
      - '.gitignore'
      - '.gitmodules'
      - 'deploy/scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      hugo_version:
        description: 'Hugo 版本覆盖（留空走默认）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  HUGO_VERSION_DEFAULT: '0.147.0'

jobs:
  build:
    name: Build (Hugo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        env:
          HUGO_VERSION: ${{ github.event.inputs.hugo_version || env.HUGO_VERSION_DEFAULT }}
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Hugo version
        run: hugo version

      - name: Build (gc + minify)
        run: hugo --gc --minify --logLevel info

      - name: Show build output
        run: |
          echo "files: $(find public -type f | wc -l)"
          echo "size : $(du -sh public | cut -f1)"
          echo "head :"
          find public -maxdepth 2 -type d | sort | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: me-noir-public
          path: public
          retention-days: 30
          if-no-files-found: error

  set-matrix:
    # 部署目标配置走 GitHub Variable (DEPLOY_HOSTS_JSON)，不入仓。
    # 格式: JSON 数组，每项 { name, host, user, port, path }。
    name: Read host list
    needs: build
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.read.outputs.hosts }}
    steps:
      - name: Load DEPLOY_HOSTS_JSON
        id: read
        env:
          HOSTS_JSON: ${{ vars.DEPLOY_HOSTS_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${HOSTS_JSON:-}" ]]; then
            echo "::error::vars.DEPLOY_HOSTS_JSON is empty. Set it in Settings → Variables → Actions (repository or environment 'production')."
            exit 1
          fi
          echo "$HOSTS_JSON" | jq -e 'type == "array" and length > 0' >/dev/null
          {
            echo "hosts<<EOF"
            echo "$HOSTS_JSON" | jq -c '{hosts: .}'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ${{ matrix.host.name }}
    needs: set-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: deploy-me.noir-${{ matrix.host.name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.set-matrix.outputs.hosts).hosts }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: me-noir-public
          path: public

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Ensure IPv6 default route (IPv6 targets only)
        if: contains(matrix.host.host, ':')
        run: |
          set -euo pipefail
          if ip -6 route show default | grep -q .; then
            echo "IPv6 default route already exists:"
            ip -6 route show default
          else
            IFACE=$(ip -6 addr show scope global -temporary \
                    | awk '/inet6/ {print $NF; exit}')
            if [[ -z "$IFACE" ]]; then
              echo "::error::No interface with global IPv6 address on runner"
              ip -6 addr show
              exit 1
            fi
            echo "Adding IPv6 default route via fe80::1 on $IFACE"
            sudo ip -6 route add default via fe80::1 dev "$IFACE"
            ip -6 route show default
          fi

      - name: Add known hosts
        # 主机指纹走 GitHub Secret (DEPLOY_KNOWN_HOSTS)，不入仓。
        # 格式: 标准 OpenSSH known_hosts 文本，可直接来自 ssh-keyscan。
        env:
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [[ -z "${KNOWN_HOSTS:-}" ]]; then
            echo "::error::secrets.DEPLOY_KNOWN_HOSTS is empty. Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "--- hosts in known_hosts (first column) ---"
          awk 'NF && $1 !~ /^#/{print "  →", $1}' ~/.ssh/known_hosts
          echo "--- known_hosts fingerprints ---"
          ssh-keygen -lf ~/.ssh/known_hosts || true

      - name: Verify live host key vs known_hosts
        # 主动探一次服务器实际 ed25519 公钥，跟 known_hosts 里的比对。
        # 用作 host key rotation 监控: VPS 重装/密钥轮换时这一步会先于 Self-test 报错。
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
        run: |
          set -euo pipefail
          echo "=== live ssh-keyscan (ed25519 only) ==="
          LIVE=$(ssh-keyscan -p "$PORT" -T 8 "$HOST" 2>/dev/null \
                 | awk '$2 == "ssh-ed25519"' || true)
          if [[ -z "$LIVE" ]]; then
            echo "::error::ssh-keyscan did not return an ed25519 key for $HOST:$PORT"
            ssh-keyscan -p "$PORT" -T 8 "$HOST" 2>&1 || true
            exit 1
          fi
          echo "$LIVE"

          echo "=== file ed25519 entries (any host pattern) ==="
          FILE=$(awk 'NF && $1 !~ /^#/' ~/.ssh/known_hosts | awk '$2 == "ssh-ed25519"' || true)
          echo "$FILE"

          echo "=== key-by-key comparison ==="
          LIVE_KEY=$(echo "$LIVE" | awk '{print $NF}')
          if echo "$FILE" | grep -qF "$LIVE_KEY"; then
            echo "OK: server's ed25519 key is present in known_hosts"
          else
            echo "::error::server's ed25519 key is NOT in known_hosts"
            echo "  server : $LIVE"
            echo "  file   : $FILE"
            echo ""
            echo "VPS host key has rotated. Fix:"
            echo "  ssh-keyscan -p $PORT -T 8 $HOST | grep ' ssh-ed25519 '"
            echo "  # 注意端口格式: 默认 22 用裸 host; 自定义端口用 [host]:PORT"
            echo "  # 然后把结果粘到 Settings → Secrets → DEPLOY_KNOWN_HOSTS"
            exit 1
          fi

      - name: Self-test SSH connection
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
          USER: ${{ matrix.host.user }}
        run: |
          set -euo pipefail
          set +e
          OUT=$(ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o HashKnownHosts=no \
            -o BatchMode=yes \
            -o ConnectTimeout=8 \
            -o LogLevel=ERROR \
            "$USER@$HOST" "echo SSH_OK" 2>&1)
          RC=$?
          set -e
          if [[ $RC -eq 0 ]]; then
            echo "OK: ssh self-test connected and authenticated"
            exit 0
          fi
          echo "::error::ssh self-test failed (rc=$RC), output:"
          echo "$OUT"
          echo "---- re-running with -vvv for diagnosis ----"
          ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o HashKnownHosts=no \
            -o BatchMode=yes \
            -o ConnectTimeout=8 \
            -vvv \
            "$USER@$HOST" "echo SSH_OK" 2>&1 || true
          exit 1

      - name: rsync -> ${{ matrix.host.name }}
        env:
          HOST: ${{ matrix.host.host }}
          PORT: ${{ matrix.host.port }}
          USER: ${{ matrix.host.user }}
          PATH_: ${{ matrix.host.path }}
        run: |
          set -euo pipefail
          # IPv6 字面量需方括号包裹；IPv4 / 域名保持原样
          if [[ "$HOST" == *":"* ]]; then
            TARGET="${USER}@[${HOST}]:${PATH_}/"
          else
            TARGET="${USER}@${HOST}:${PATH_}/"
          fi
          rsync -avz --delete \
            --no-perms --no-owner --no-group \
            -e "ssh -p ${PORT} \
                    -o StrictHostKeyChecking=yes \
                    -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
                    -o HashKnownHosts=no \
                    -o LogLevel=ERROR" \
            public/ \
            "${TARGET}"
          echo "OK: ${{ matrix.host.name }} deployed to ${TARGET}"
